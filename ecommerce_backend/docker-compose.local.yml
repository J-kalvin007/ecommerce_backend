volumes:
  ecommerce_backend_local_postgres_data: {}
  ecommerce_backend_local_postgres_data_backups: {}
  ecommerce_backend_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: ecommerce_backend_local_django
    container_name: ecommerce_backend_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: ecommerce_backend_production_postgres
    container_name: ecommerce_backend_local_postgres
    volumes:
      - ecommerce_backend_local_postgres_data:/var/lib/postgresql/data
      - ecommerce_backend_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: ecommerce_backend_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:7.2
    container_name: ecommerce_backend_local_redis
    volumes:
      - ecommerce_backend_local_redis_data:/data

  celeryworker:
    <<: *django
    image: ecommerce_backend_local_celeryworker
    container_name: ecommerce_backend_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: ecommerce_backend_local_celerybeat
    container_name: ecommerce_backend_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: ecommerce_backend_local_flower
    container_name: ecommerce_backend_local_flower
    ports:
      - '5555:5555'
    command: /start-flower



  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: ecommerce_backend_local_pgadmin
  #   depends_on:
  #     - postgres
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: kalvin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: myriade1234
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #   ports:
  #     - "5050:80"
  #   restart: unless-stopped



  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecommerce_backend_local_pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: kalvin@admin.com
      PGADMIN_DEFAULT_PASSWORD: myriade1234
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    restart: unless-stopped